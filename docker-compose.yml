# Phase 18 — one-command deploy of the Counter Douglas stack.
#
#   docker compose --env-file .env up --build
#
# Then open http://localhost:8080 in a browser. In the Connect overlay,
# enter:  ws://localhost:9876  (the server is exposed directly).
#
# If you enable the /ws proxy in nginx.conf, use:  ws://localhost:8080/ws
# and comment out the "ports" line on the server service.
#
# Requires a .env file (copy .env.example and fill in values).

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 3s

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "9876:9876"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Uncomment to keep the server internal (only reachable via nginx proxy).
    # expose:
    #   - "9876"

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pgdata:
