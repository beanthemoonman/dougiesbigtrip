# Phase 17 — one-command deploy of the Counter Douglas stack.
#
#   docker compose --env-file .env up --build
#
# Then open http://localhost:8080 (or https://localhost:8443 with a
# self-signed cert warning). The browser connects to the server through
# the nginx proxy — no separate :9876 port needed.
#
#   WS path:    ws://localhost:8080/ws   (or wss://localhost:8443/ws)
#
# Requires a .env file (copy .env.example and fill in values).

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Creates the `keycloak` schema. First boot only — see auth/init-schema.sql.
      - ./auth/init-schema.sql:/docker-entrypoint-initdb.d/10-keycloak-schema.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 3s

  auth:
    image: quay.io/keycloak/keycloak:26
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-dougys}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_DB_SCHEMA: keycloak
      KC_HEALTH_ENABLED: "true"
      # Full public URL: nginx sends Host without the port, so a bare hostname
      # would build redirect/issuer URLs missing :8443 and break the OAuth
      # round-trip. Override in .env for a real deployment.
      KC_HOSTNAME: ${KC_HOSTNAME:-https://localhost:8443/auth}
      # Keycloak serves at / by default; the proxy and all the advertised
      # redirect URIs use /auth.
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
    expose:
      - "8080"
    volumes:
      - ./auth/counter-douglas-realm.json:/opt/keycloak/data/import/counter-douglas-realm.json:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Health lives on the management port (9000) since Keycloak 25, at the
      # management root — KC_HTTP_RELATIVE_PATH does not move it.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3; head -1 <&3 | grep -q 200"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      DATABASE_URL: ${DATABASE_URL}
    expose:
      - "9876"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      - server
    restart: unless-stopped
    # Prod: mount real certs over the baked-in self-signed pair.
    # volumes:
    #   - ./certs:/etc/nginx/certs:ro

volumes:
  pgdata:
