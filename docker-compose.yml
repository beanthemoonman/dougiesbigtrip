# Phase 17 — one-command deploy of the Counter Douglas stack.
#
#   docker compose --env-file .env up --build
#
# Then open http://localhost:8080 (or https://localhost:8443 with a
# self-signed cert warning). The browser connects to the server through
# the nginx proxy — no separate :9876 port needed.
#
#   WS path:    ws://localhost:8080/ws   (or wss://localhost:8443/ws)
#
# Requires a .env file (copy .env.example and fill in values).

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 3s

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      DATABASE_URL: ${DATABASE_URL}
    expose:
      - "9876"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      - server
    restart: unless-stopped
    # Prod: mount real certs over the baked-in self-signed pair.
    # volumes:
    #   - ./certs:/etc/nginx/certs:ro

volumes:
  pgdata:
