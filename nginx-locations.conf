# Shared location blocks for both the :80 and :443 server blocks in nginx.conf.
# Included twice — edit here, not there.

location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# WebSocket proxy to the Rust deathmatch server.
location /ws {
    proxy_pass http://server:9876;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}

# Server HTTP endpoints (status, future admin API).
location /status {
    proxy_pass http://server:9876/status;
    proxy_set_header Host $host;
}
location /api/ {
    proxy_pass http://server:9876/api/;
    proxy_set_header Host $host;
}

# Keycloak (Phase 17.2).
location /auth/ {
    proxy_pass http://auth:8080/auth/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# SPA fallback: serve index.html for any non-file route.
location / {
    try_files $uri $uri/ /index.html;
}
