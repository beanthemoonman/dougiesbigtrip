# Phase 17.1 — nginx as the single ingress for the Counter Douglas stack.
#
# TLS terminates here (self-signed for local dev / real certs mounted in
# prod).  Everything else is plain HTTP behind the proxy:
#
#   /        → client SPA (static files, index.html fallback)
#   /ws      → server :9876  (WebSocket upgrade)
#   /status  → server :9876  (HTTP status — the raw-TCP peek in main.rs)
#   /api/    → server :9876  (admin REST, Phase 20)
#   /auth/   → Keycloak      (Phase 17.2 — placeholder until the auth
#                              container exists)
#
# Without the proxy the browser connects directly to ws://host:9876.
# To skip TLS entirely, access the site over plain HTTP on port 80 —
# the HTTP server block mirrors the proxy paths without SSL.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip_static on;
    gzip_vary on;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket proxy to the Rust deathmatch server.
    location /ws {
        proxy_pass http://server:9876;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Server HTTP endpoints (status, future admin API).
    location /status {
        proxy_pass http://server:9876/status;
        proxy_set_header Host $host;
    }
    location /api/ {
        proxy_pass http://server:9876/api/;
        proxy_set_header Host $host;
    }

    # Keycloak — active after Phase 17.2.
    # location /auth/ {
    #     proxy_pass http://auth:8080/auth/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    gzip_static on;
    gzip_vary on;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /ws {
        proxy_pass http://server:9876;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /status {
        proxy_pass http://server:9876/status;
        proxy_set_header Host $host;
    }
    location /api/ {
        proxy_pass http://server:9876/api/;
        proxy_set_header Host $host;
    }

    # location /auth/ {
    #     proxy_pass http://auth:8080/auth/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
