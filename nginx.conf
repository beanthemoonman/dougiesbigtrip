# Phase 17 — nginx as the single ingress for the Counter Douglas stack.
#
# TLS terminates here (self-signed for local dev / real certs mounted in
# prod — see docs/deploy.md).  Everything else is plain HTTP behind the proxy:
#
#   /        → client SPA (static files, index.html fallback)
#   /ws      → server :9876  (WebSocket upgrade)
#   /status  → server :9876  (HTTP status — the raw-TCP peek in main.rs)
#   /api/    → server :9876  (admin REST, Phase 20)
#   /auth/   → Keycloak      (Phase 17.2)
#
# The server's game port is NOT published by docker compose — every browser
# reaches it through /ws here. To skip TLS, use plain HTTP on port 80; both
# server blocks include the same locations from nginx-locations.conf.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip_static on;
    gzip_vary on;

    include /etc/nginx/nginx-locations.conf;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    gzip_static on;
    gzip_vary on;

    include /etc/nginx/nginx-locations.conf;
}
