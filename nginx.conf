# nginx config for the Counter Douglas client SPA.
# Serves the built Vite assets with SPA routing fallback.
# Optionally proxies WebSocket connections to the Rust server at /ws —
# enable the /ws location block and uncomment the server definition in
# docker-compose.yml if you want single-port access from the browser.
#
# Without the proxy, connect the browser directly to ws://<host>:9876.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip pre-compressed assets (Vite can produce .gz alongside).
    gzip_static on;
    gzip_vary on;

    # Static assets with immutable cache (hashed filenames from Vite).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: serve index.html for any non-file route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket proxy to the Rust deathmatch server.
    # The client connects to ws://<this-host>/ws and nginx relays the
    # WebSocket upgrade handshake to the server.
    #
    # location /ws {
    #     proxy_pass http://server:9876;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_read_timeout 86400s;
    #     proxy_send_timeout 86400s;
    # }
}
